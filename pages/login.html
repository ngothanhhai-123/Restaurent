<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng Nhập | L'Élite Gourmet</title>
    <link rel="stylesheet" href="/css/index.css">
  </head>
  <body>
    <div id="navbar-container"></div>
    
    <div class="relative flex min-h-screen w-full flex-col items-center justify-center overflow-hidden">
      <!-- Background -->
      <div class="fixed inset-0 z-0">
        <div class="absolute inset-0 bg-bg-dark/80 z-10"></div>
        <div 
          class="w-full h-full bg-center bg-cover opacity-40"
          style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCiGvM_FAvbV3W09_y42Bk-zQp-7MaR40w_kcvkEA4X-fGGKV5S0USmi1zp9MTUt4U355azuIVmsvMrRmC_7pXCqQ0GoUmy_vViHq_XBprjCktaEYyUv16I3btoSwfXfSH1rGuqx9HXRXca7IGPl4DZ84Hrr5t1D4MA_uywF9WN6OwZ7GwBcIkXaUSEj5wTLuZxu73cBMnaL0GB6mumLXSRVXtnxN_BajCjlDVA_ZRSIYULeClfr-vRfEvzKkRtYIHdD-f8cmsOh9Vs')"
        ></div>
      </div>

      <div class="relative z-20 w-full max-w-[480px] bg-bg-dark/60 backdrop-blur-md rounded-xl border border-primary/20 shadow-2xl p-6 md:p-10 animate-fade-in-up">
        <header class="flex flex-col items-center justify-center gap-4 mb-10">
          <div class="flex items-center gap-3 text-primary">
            <div class="size-10 flex items-center justify-center bg-primary rounded-lg text-white">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>
            </div>
            <h2 class="text-white text-3xl font-black uppercase tracking-tight">Gourmet</h2>
          </div>
        </header>

        <div class="text-center mb-8">
          <h1 class="text-white text-3xl font-bold">Chào mừng trở lại</h1>
          <p class="text-slate-400">Vui lòng đăng nhập để trải nghiệm tinh hoa ẩm thực</p>
        </div>

        <form class="space-y-5" id="login-form">
          <div class="space-y-1.5">
            <label class="text-slate-200 text-sm font-medium px-1">Email hoặc Số điện thoại</label>
            <div class="relative">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
              <input type="text" placeholder="example@gourmet.vn" required class="w-full bg-bg-dark/50 border border-primary/30 rounded-lg py-3 pl-10 pr-4 text-white placeholder:text-slate-600 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" />
            </div>
          </div>
          <div class="space-y-1.5">
            <div class="flex justify-between items-center px-1">
              <label class="text-slate-200 text-sm font-medium">Mật khẩu</label>
              <a href="#" class="text-primary text-xs font-semibold hover:underline">Quên mật khẩu?</a>
            </div>
            <div class="relative">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <input type="password" placeholder="••••••••" required class="w-full bg-bg-dark/50 border border-primary/30 rounded-lg py-3 pl-10 pr-10 text-white placeholder:text-slate-600 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" />
              <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <div class="flex items-center gap-2 px-1">
            <input type="checkbox" id="remember" class="rounded border-primary/30 bg-bg-dark text-primary focus:ring-primary" />
            <label for="remember" class="text-slate-400 text-sm cursor-pointer">Ghi nhớ đăng nhập</label>
          </div>
          <button type="submit" class="w-full inline-flex items-center justify-center rounded-md font-medium transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:pointer-events-none disabled:opacity-50 bg-primary text-primary-foreground shadow hover:bg-primary/90 py-4 gap-2 text-white">
            ĐĂNG NHẬP <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          </button>
        </form>

        <div class="mt-10 pt-6 border-t border-slate-700/50 text-center">
          <p class="text-slate-400 text-sm">
            Bạn chưa có tài khoản? <a href="/pages/register.html" class="text-primary font-bold hover:underline ml-1">Đăng ký ngay</a>
          </p>
        </div>

        <div class="mt-8">
          <div class="relative flex items-center justify-center mb-6">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-700/50"></div></div>
            <span class="relative px-4 text-xs uppercase text-slate-500 bg-transparent">Hoặc đăng nhập bằng</span>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <button class="inline-flex items-center justify-center rounded-md text-sm font-medium transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:pointer-events-none disabled:opacity-50 border border-input bg-transparent shadow-sm h-9 px-4 py-2 border-slate-700 text-white hover:bg-slate-800 gap-2">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><line x1="21.17" x2="12" y1="8" y2="8"/><line x1="3.95" x2="8.54" y1="6.06" y2="14"/><line x1="10.88" x2="15.46" y1="21.94" y2="14"/></svg> Google
            </button>
            <button class="inline-flex items-center justify-center rounded-md text-sm font-medium transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:pointer-events-none disabled:opacity-50 border border-input bg-transparent shadow-sm h-9 px-4 py-2 border-slate-700 text-white hover:bg-slate-800 gap-2">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-500"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg> Facebook
            </button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/js/login.js"></script>
  </body>
</html>
