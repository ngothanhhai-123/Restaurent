<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hồ Sơ | L'Élite Gourmet</title>
    <link rel="stylesheet" href="/css/index.css">
  </head>
  <body>
    <div id="navbar-container"></div>
    
    <div class="min-h-screen bg-bg-light dark:bg-bg-dark py-12 px-4 lg:px-40">
      <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        <!-- Sidebar -->
        <aside class="lg:col-span-4 space-y-6">
          <div class="bg-white dark:bg-primary/5 rounded-2xl p-8 border border-primary/10 shadow-xl text-center">
            <div class="relative inline-block mb-4">
              <div class="size-24 rounded-full bg-primary/20 flex items-center justify-center text-primary border-2 border-primary">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              </div>
              <button 
                id="btn-edit-profile-avatar"
                class="absolute bottom-0 right-0 bg-primary text-white p-1.5 rounded-full border-2 border-white dark:border-bg-dark hover:bg-primary/80 transition-colors"
              >
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <h2 class="text-2xl font-bold">Nguyễn Văn A</h2>
            <p class="text-sm text-primary font-bold uppercase tracking-widest mt-1">Thành viên Vàng</p>
            
            <div class="mt-8 grid grid-cols-2 gap-4 border-t border-primary/10 pt-8">
              <div class="text-center">
                <span class="block text-2xl font-black text-primary">1,250</span>
                <span class="text-xs text-slate-500 uppercase font-bold">Điểm tích lũy</span>
              </div>
              <div class="text-center">
                <span class="block text-2xl font-black text-primary">12</span>
                <span class="text-xs text-slate-500 uppercase font-bold">Đơn hàng</span>
              </div>
            </div>
          </div>

          <nav class="bg-white dark:bg-primary/5 rounded-2xl overflow-hidden border border-primary/10 shadow-xl" id="profile-nav">
            <!-- Injected by JS -->
          </nav>
        </aside>

        <!-- Main Content -->
        <main class="lg:col-span-8 space-y-8" id="profile-content">
          <!-- Injected by JS -->
        </main>
      </div>
    </div>

    <div id="footer-container"></div>
    <script type="module" src="/js/profile.js"></script>
  </body>
</html>
