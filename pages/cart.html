<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giỏ Hàng | L'Élite Gourmet</title>
    <link rel="stylesheet" href="/css/index.css">
  </head>
  <body>
    <div id="navbar-container"></div>
    
    <div class="min-h-screen bg-bg-light dark:bg-bg-dark py-12 px-4 lg:px-40">
      <div class="max-w-7xl mx-auto">
        <div class="flex items-center gap-4 mb-12 animate-fade-in-up">
          <div class="bg-primary p-3 rounded-xl text-white">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          </div>
          <div>
            <h1 class="text-4xl font-black">Giỏ hàng của bạn</h1>
            <p class="text-slate-500" id="cart-count">Bạn đang có 0 món trong giỏ hàng</p>
          </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
          <!-- Items List -->
          <div class="lg:col-span-8 space-y-6">
            <div id="cart-items-container">
              <!-- Injected by JS -->
            </div>

            <div class="pt-6 animate-fade-in-up" style="animation-delay: 200ms">
              <a href="/pages/menu.html" class="inline-flex items-center justify-center rounded-md text-sm font-medium transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:pointer-events-none disabled:opacity-50 border border-input bg-transparent shadow-sm hover:bg-accent hover:text-accent-foreground h-10 px-4 py-2 gap-2">
                Tiếp tục mua sắm
              </a>
            </div>
          </div>

          <!-- Summary -->
          <aside class="lg:col-span-4 animate-fade-in-up" style="animation-delay: 300ms">
            <div class="bg-bg-dark text-white rounded-2xl p-8 border border-primary/20 shadow-2xl sticky top-32 space-y-8">
              <h3 class="text-2xl font-bold border-b border-white/10 pb-4">Tổng cộng</h3>
              
              <div class="space-y-4" id="cart-summary">
                <!-- Injected by JS -->
              </div>

              <div class="space-y-4">
                <div class="flex items-center gap-3 p-4 bg-white/5 rounded-xl border border-white/10">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-primary"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>
                  <div class="text-sm">
                    <p class="font-bold">Phương thức thanh toán</p>
                    <p class="text-slate-400">Thẻ tín dụng (Visa/Mastercard)</p>
                  </div>
                </div>
                <div class="flex items-center gap-3 p-4 bg-white/5 rounded-xl border border-white/10">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-primary"><path d="M5 18H3c-.6 0-1-.4-1-1V7c0-.6.4-1 1-1h10c.6 0 1 .4 1 1v11"/><path d="M14 9h4l4 4v4c0 .6-.4 1-1 1h-2"/><circle cx="7" cy="18" r="2"/><path d="M15 18H9"/><circle cx="17" cy="18" r="2"/></svg>
                  <div class="text-sm">
                    <p class="font-bold">Thời gian giao hàng</p>
                    <p class="text-slate-400">Dự kiến: 30 - 45 phút</p>
                  </div>
                </div>
              </div>

              <button id="checkout-btn" class="w-full inline-flex items-center justify-center rounded-md font-medium transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:pointer-events-none disabled:opacity-50 bg-primary text-primary-foreground hover:bg-primary/90 py-5 text-lg gap-2 shadow-2xl shadow-primary/40 text-white">
                THANH TOÁN NGAY <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
              </button>
            </div>
          </aside>
        </div>
      </div>
    </div>

    <div id="footer-container"></div>
    <script type="module" src="/js/cart.js"></script>
  </body>
</html>
